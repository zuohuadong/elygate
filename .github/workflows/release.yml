name: Release Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
          - target: bun-linux-arm64
            os: ubuntu-latest
          - target: bun-darwin-x64
            os: macos-latest
          - target: bun-darwin-arm64
            os: macos-latest
          - target: bun-windows-x64
            os: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Web UI
        run: bun run build

      - name: Build Binary
        run: bun run scripts/build-binary.ts
        shell: bash

      - name: Rename Binary
        run: |
          if [ "${{ matrix.target }}" = "bun-windows-x64" ]; then
            mv elygate-*.exe elygate-${{ matrix.target }}.exe || true
          else
            mv elygate-* elygate-${{ matrix.target }} || true
          fi
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: elygate-${{ matrix.target }}
          path: |
            elygate-${{ matrix.target }}
            elygate-${{ matrix.target }}.exe
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get Version
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            # Elygate ${{ steps.version.outputs.version }}
            
            ---
            
            ## English
            
            ### 🆕 What's New
            
            - **🔐 Secure Cookie Session Authentication**
              - HttpOnly Cookie-based authentication with server-side session management
              - Supports multi-device login, server-side logout, and automatic session expiration
              - Effectively prevents XSS attacks
            
            - **📊 Enhanced Model Management**
              - Lazy loading for better performance with hundreds of models
              - Real-time availability filtering (Online/Offline)
              - Improved model card display with provider/model name separation
            
            - **🎨 UI/UX Improvements**
              - Channel list now sorted by ID (newest first)
              - Better visual distinction for offline models
              - Console sensitive information filtering
            
            ### 📦 Downloads
            
            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Linux | x64 | `elygate-bun-linux-x64` |
            | Linux | ARM64 | `elygate-bun-linux-arm64` |
            | macOS | x64 | `elygate-bun-darwin-x64` |
            | macOS | ARM64 | `elygate-bun-darwin-arm64` |
            | Windows | x64 | `elygate-bun-windows-x64.exe` |
            
            ### 🚀 Quick Start
            
            ```bash
            # Linux/macOS
            chmod +x elygate-*
            ./elygate-*
            
            # Windows
            .\elygate-bun-windows-x64.exe
            ```
            
            ### 📋 Requirements
            
            - PostgreSQL 15+
            - Environment variables in `.env`
            
            ### 🔧 Environment Variables
            
            ```bash
            DATABASE_URL=postgresql://user:pass@localhost:5432/elygate
            GATEWAY_URL=http://localhost:3000
            WEB_URL=http://localhost:3000
            ```
            
            ---
            
            ## 简体中文
            
            ### 🆕 更新内容
            
            - **🔐 安全 Cookie 会话认证**
              - 基于 HttpOnly Cookie 的服务端会话认证
              - 支持多端登录、服务端注销和自动会话过期
              - 有效防止 XSS 攻击
            
            - **📊 增强模型管理**
              - 懒加载优化，流畅展示数百个模型
              - 实时可用性筛选（在线/离线）
              - 优化模型卡片显示，分离厂商/模型名称
            
            - **🎨 UI/UX 改进**
              - 渠道列表按 ID 倒序排列（最新添加的显示在最上方）
              - 离线模型视觉区分更明显
              - 控制台敏感信息过滤
            
            ### 📦 下载
            
            | 平台 | 架构 | 下载文件 |
            |----------|--------------|----------|
            | Linux | x64 | `elygate-bun-linux-x64` |
            | Linux | ARM64 | `elygate-bun-linux-arm64` |
            | macOS | x64 | `elygate-bun-darwin-x64` |
            | macOS | ARM64 | `elygate-bun-darwin-arm64` |
            | Windows | x64 | `elygate-bun-windows-x64.exe` |
            
            ### 🚀 快速开始
            
            ```bash
            # Linux/macOS
            chmod +x elygate-*
            ./elygate-*
            
            # Windows
            .\elygate-bun-windows-x64.exe
            ```
            
            ### 📋 系统要求
            
            - PostgreSQL 15+
            - `.env` 环境变量配置
            
            ### 🔧 环境变量
            
            ```bash
            DATABASE_URL=postgresql://user:pass@localhost:5432/elygate
            GATEWAY_URL=http://localhost:3000
            WEB_URL=http://localhost:3000
            ```
            
            ---
            
            See [Binary Build Guide](https://github.com/${{ github.repository }}/blob/main/BINARY_BUILD.md) for detailed instructions.
          files: |
            artifacts/elygate-bun-linux-x64/elygate-bun-linux-x64
            artifacts/elygate-bun-linux-arm64/elygate-bun-linux-arm64
            artifacts/elygate-bun-darwin-x64/elygate-bun-darwin-x64
            artifacts/elygate-bun-darwin-arm64/elygate-bun-darwin-arm64
            artifacts/elygate-bun-windows-x64/elygate-bun-windows-x64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
