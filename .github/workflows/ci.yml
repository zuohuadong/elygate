name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '24'

jobs:
  test:
    name: Build & Test Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install PostgreSQL smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates postgresql-common
          yes | sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh
          sudo apt-get update
          sudo apt-get install -y postgresql-18 postgresql-18-cron postgresql-18-pgvector
          echo "POSTGRES_BIN_DIR=/usr/lib/postgresql/18/bin" >> "$GITHUB_ENV"

      - name: Install Dependencies
        run: bun install

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps chromium

      - name: Verify Dependency Audit
        run: bun run security:audit

      - name: Verify Full Readiness Gate
        timeout-minutes: 20
        run: bun run check

      - name: Verify Web UI Build
        run: bun run build

      - name: Verify Gateway Build (Check for type errors)
        # Elygate uses TS, we ensure the index builds without syntax issues
        run: bun build src/index.ts --target=bun
        working-directory: ./apps/gateway
