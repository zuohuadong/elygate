name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  REGISTRY: ghcr.io
  IMAGE_NAME_GATEWAY: ${{ github.repository_owner }}/elygate-gateway
  IMAGE_NAME_WEB: ${{ github.repository_owner }}/elygate-web
  IMAGE_NAME_DB: ${{ github.repository_owner }}/elygate-db

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Gateway
        id: meta-gateway
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_GATEWAY }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Gateway image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.gateway
          push: true
          tags: ${{ steps.meta-gateway.outputs.tags }}
          labels: ${{ steps.meta-gateway.outputs.labels }}

      - name: Extract metadata (tags, labels) for Web
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
      - name: Extract metadata (tags, labels) for DB
        id: meta-db
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_DB }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push DB image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.postgres
          push: true
          tags: ${{ steps.meta-db.outputs.tags }}
          labels: ${{ steps.meta-db.outputs.labels }}
