name: Build Binary

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
            arch: x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            arch: arm64
          - target: bun-darwin-x64
            os: macos-latest
            arch: x64
          - target: bun-darwin-arm64
            os: macos-latest
            arch: arm64
          - target: bun-windows-x64
            os: windows-latest
            arch: x64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Web UI
        run: bun run build
        working-directory: ./apps/web

      - name: Build Binary
        run: |
          if [ "${{ matrix.target }}" = "bun-windows-x64" ]; then
            bun build apps/gateway/src/index.ts --compile --minify --target=${{ matrix.target }} --outfile=elygate-${{ matrix.target }}.exe
          else
            bun build apps/gateway/src/index.ts --compile --minify --target=${{ matrix.target }} --outfile=elygate-${{ matrix.target }}
          fi
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: elygate-${{ matrix.target }}
          path: |
            elygate-${{ matrix.target }}
            elygate-${{ matrix.target }}.exe
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get Version
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=v$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            # Elygate ${{ steps.version.outputs.version }}
            
            ## 📦 Downloads
            
            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Linux | x64 | `elygate-bun-linux-x64` |
            | Linux | ARM64 | `elygate-bun-linux-arm64` |
            | macOS | x64 | `elygate-bun-darwin-x64` |
            | macOS | ARM64 | `elygate-bun-darwin-arm64` |
            | Windows | x64 | `elygate-bun-windows-x64.exe` |
            
            ## 🚀 Quick Start
            
            ```bash
            # Download and run
            chmod +x elygate-*
            ./elygate-*
            ```
            
            ## 📋 Requirements
            
            - PostgreSQL 15+
            - Environment variables configured
            
            See [documentation](https://github.com/${{ github.repository }}/blob/main/BINARY_BUILD.md) for details.
          files: |
            artifacts/elygate-bun-linux-x64/elygate-bun-linux-x64
            artifacts/elygate-bun-linux-arm64/elygate-bun-linux-arm64
            artifacts/elygate-bun-darwin-x64/elygate-bun-darwin-x64
            artifacts/elygate-bun-darwin-arm64/elygate-bun-darwin-arm64
            artifacts/elygate-bun-windows-x64/elygate-bun-windows-x64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
