name: Build Binary

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false

env:
  NODE_VERSION: '24'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
            arch: x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            arch: arm64
          - target: bun-darwin-x64
            os: macos-latest
            arch: x64
          - target: bun-darwin-arm64
            os: macos-latest
            arch: arm64
          - target: bun-windows-x64
            os: windows-latest
            arch: x64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        run: bun install

      - name: Build Web UI
        run: bun run build

      - name: Build Binary
        run: bun run scripts/build-binary.ts ${{ matrix.target }}
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: elygate-${{ matrix.target }}
          path: |
            elygate-${{ matrix.target }}
            elygate-${{ matrix.target }}.exe
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Get Version
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            CURRENT_VERSION=$(jq -r .version package.json)
            echo "version=v$CURRENT_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: |
            artifacts/elygate-bun-linux-x64/elygate-bun-linux-x64
            artifacts/elygate-bun-linux-arm64/elygate-bun-linux-arm64
            artifacts/elygate-bun-darwin-x64/elygate-bun-darwin-x64
            artifacts/elygate-bun-darwin-arm64/elygate-bun-darwin-arm64
            artifacts/elygate-bun-windows-x64/elygate-bun-windows-x64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
