version: "3.8"

services:
  # ──── PostgreSQL with pgvector + pg_cron + pg_bigm ────────
  db:
    image: ankane/pgvector:v0.5.1
    container_name: elygate-db
    restart: always
    environment:
      POSTGRES_USER: dbuser_dba
      POSTGRES_PASSWORD: DBUser.DBA
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/db/src/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbuser_dba -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    # ──── Gateway (Bun + Elysia) ──────────────────────────────
  gateway:
    image: ghcr.nju.edu.cn/zuohuadong/elygate-gateway:latest
    container_name: elygate-gateway
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgres://dbuser_dba:DBUser.DBA@db:5432/postgres
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  # ──── Web Admin Panel (SvelteKit + Bun) ──────────────────
  web:
    image: ghcr.nju.edu.cn/zuohuadong/elygate-web:latest
    container_name: elygate-web
    restart: always
    env_file: .env
    environment:
      VITE_API_BASE_URL: http://81.70.19.83:3000
    ports:
      - "3001:3001"
    depends_on:
      - gateway

volumes:
  pgdata:
