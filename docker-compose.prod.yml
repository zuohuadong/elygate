version: "3.8"

services:
  db:
    image: ghcr.nju.edu.cn/zuohuadong/elygate-db:latest
    container_name: elygate-db
    restart: always
    privileged: true
    environment:
      POSTGRES_USER: dbuser_dba
      POSTGRES_PASSWORD: ${ELYGATE_DB_PASSWORD:-elygate_change_me}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dbuser_dba -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway:
    image: ghcr.nju.edu.cn/zuohuadong/elygate-gateway:latest
    container_name: elygate-gateway
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dbuser_dba:${ELYGATE_DB_PASSWORD:-elygate_change_me}@db:5432/postgres
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.nju.edu.cn/zuohuadong/elygate-web:latest
    container_name: elygate-web
    restart: always
    env_file: .env
    environment:
      VITE_API_BASE_URL: http://gateway:3000
    ports:
      - "3001:3001"
    depends_on:
      - gateway

volumes:
  pgdata:
