version: "3.8"

services:
  # ──── PostgreSQL with pgvector + pg_cron + pg_bigm ────────
  db:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
    container_name: elygate-db
    restart: always
    privileged: true
    environment:
      POSTGRES_USER: dbuser_dba
      POSTGRES_PASSWORD: ${ELYGATE_DB_PASSWORD:-elygate_change_me}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - pgdata:/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dbuser_dba -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ──── Gateway (Bun + Elysia) ──────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: elygate-gateway
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dbuser_dba:${ELYGATE_DB_PASSWORD:-elygate_change_me}@db:5432/postgres
    ports:
      - "3003:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - elygate-network

  # ──── Web Admin Panel (Svelte + Bun) ─────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: elygate-web
    restart: always
    env_file: .env
    environment:
      VITE_API_BASE_URL: http://gateway:3000
    ports:
      - "3001:3001"
    depends_on:
      - gateway
    networks:
      - elygate-network

  # ──── Enterprise Portal (SvelteKit + Bun) ────────────────
  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    container_name: elygate-portal
    restart: always
    environment:
      DATABASE_URL: postgresql://dbuser_dba:${ELYGATE_DB_PASSWORD:-elygate_change_me}@db:5432/postgres
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      gateway:
        condition: service_started
    networks:
      - elygate-network

networks:
  elygate-network:
    driver: bridge

volumes:
  pgdata:
